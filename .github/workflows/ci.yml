name: CI Verification

# <!-- AGENT: DEVOPS -->
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: v2.95.4

      - name: Start local database
        run: supabase start

      - name: Configure local Supabase environment
        shell: bash
        run: |
          supabase status -o env > supabase.env
          set -a
          source supabase.env
          set +a
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3107"
          } > .env.local

      - name: Run Verification
        run: npm run verify
        env:
          LOOKUP_TEST_PORT: 3107

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
